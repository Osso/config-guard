# Machine-local policy seed for Alessio's config-guard setup.
# This file contains path ownership rules only, never credential values.

fail_open = true
dev_tools = [
  "claude",
  "codex",
  "opencode",
  "cursor",
  "node",
  "python",
  "python3",
]

[[owned_paths]]
path = "/home/osso/.codex"
owner = "codex"
allowed_subjects = []

[[owned_paths]]
path = "/home/osso/.config/claude"
owner = "claude"
allowed_subjects = ["codex", "claude-memory"]

[[owned_paths]]
path = "/home/osso/.config/codex"
owner = "codex"
allowed_subjects = []

